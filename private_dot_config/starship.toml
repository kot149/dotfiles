"$schema" = "https://starship.rs/config-schema.json"

# гѓ—гѓ­гѓігѓ—гѓ€гЃ®е‰ЌгЃ«ж”№иЎЊг‚’иїЅеЉ 
add_newline = true

palette = 'my_colors'

format = """
$os$custom$shell\
$directory\
$git_branch\
$git_commit\
$git_status\
$python\
$nodejs\
$bun\
$rust\
[о‚ґ](fg:prev_bg)\
$fill\
$status$cmd_duration$time[о‚ґ](fg:prev_bg)
$character\
"""

[ palettes . my_colors ]
text_fg = '#ffffff'

os_bg = '#63778c'
windows_bg = '#4378ad'
macos_bg = '#aeb9c4'
macos_fg = '#180f09'
ubuntu_bg = '#a65f46'
debian_bg = '#a75b5c'

shell_bg = '#696969'
powershell_bg = '#183a5b'
cmd_bg = '#696969'
zsh_bg = '#4378ad'
bash_bg = '#4a3315'

dir_bg = '#f4a25c'
dir_fg = '#180f09'

git_bg = '#7e66a6'

python_bg = '#4378ad'
rust_bg = '#a75d4b'
node_bg = '#4c844f'
bun_bg = '#3e3a35'

status_bg = '#bc4945'
status_fg = '#ffffff'
time_bg = '#687686'
cmd_duration_bg = '#738292'

[fill]
symbol = " "
style = "bg:transparent fg:transparent"

[line_break]
disabled = true

[character]
success_symbol = "[ вќЇ](bold white)"
error_symbol = "[ вќЇ](bold white)"

[os]
disabled = false
format = '[$custom$symbol]($style)'

[os.symbols]
Windows = "[о‚¶](fg:windows_bg)[оњЏ ](bold bg:windows_bg)"
Macos = "[о‚¶](fg:macos_bg)[оњ‘ ](bold bg:macos_bg fg:macos_fg)"
Ubuntu = "[о‚¶](fg:ubuntu_bg)[оЇ‰ ](bold bg:ubuntu_bg)"
Debian = "[о‚¶](fg:debian_bg)[оќЅ ](bold bg:debian_bg)"

[custom.wsl]
os = "linux"
when = "uname -r | grep WSL"
format = "[WSL](bold bg:prev_bg fg:prev_fg)"

[shell]
disabled = false
format = "$indicator"
powershell_indicator = "[о‚ґ](fg:prev_bg bg:powershell_bg)[ pwsh ](bg:powershell_bg fg:text_fg)"
zsh_indicator = "[о‚ґ](fg:prev_bg bg:zsh_bg)[ zsh ](bg:zsh_bg fg:text_fg)"
bash_indicator = "[о‚ґ](fg:prev_bg bg:bash_bg)[ bash ](bg:bash_bg fg:text_fg)"
cmd_indicator = "[о‚ґ](fg:prev_bg bg:cmd_bg)[ cmd ](bg:cmd_bg fg:text_fg)"

[directory]
style = "bg:dir_bg fg:dir_fg"
read_only_style = "bg:dir_bg fg:dir_fg"
format = "[о‚ґ](fg:prev_bg bg:dir_bg)[ \uf07c ( )($read_only) $path ]($style)"
read_only = " \uf023"
truncation_length = 99
truncate_to_repo = false

[git_branch]
symbol = "оњҐ "
style = "bg:git_bg fg:text_fg"
format = "[о‚ґ](fg:prev_bg bg:git_bg)[ $symbol$branch ]($style)"
only_attached = true

[git_commit]
style = "bg:git_bg fg:text_fg"
format = "[о‚ґ](fg:prev_bg bg:git_bg)[ оњҐо‚  пђµ $hash$tag]($style)"

[git_status]
style = "bg:git_bg fg:text_fg"
format = '[($ahead_behind)( $staged)( $untracked)( $modified)( $deleted)]($style)'
up_to_date = "вњ”"
ahead = 'оЄЎ $count'
behind = 'оЄљ $count'
diverged = 'оЄљ $behind_countоЄЎ $ahead_count'

staged = "+$count"

modified = "пЃ„ $count"
untracked = "о©ї $count"
deleted = "у°—Ё $count"
renamed = "у°‘“ $count"

stashed = ""

[nodejs]
symbol = "у°Ћ™"
style = "bg:node_bg fg:text_fg"
format = "[о‚ґ](fg:prev_bg bg:node_bg)[ $symbol ($version) ]($style)"
version_format = " v${raw}"

[python]
symbol = "оњј"
style = "bg:python_bg fg:text_fg"
format = "[о‚ґ](fg:prev_bg bg:python_bg)[ $symbol ($version) ]($style)"
version_format = " v${raw}"
detect_folders = [".venv", "venv"]

[bun]
symbol = "оќЇ"
style = "bg:bun_bg fg:text_fg"
format = "[о‚ґ](fg:prev_bg bg:bun_bg)[ $symbol ( $version) ]($style)"

[rust]
symbol = "оћЁ"
style = "bg:rust_bg fg:text_fg"
format = "[о‚ґ](fg:prev_bg bg:rust_bg)[ $symbol ($version) ]($style)"
version_format = " v${raw}"
detect_files = ['Cargo.toml']
detect_folders = ['src-tauri']

[time]
disabled = false
style = "bg:time_bg fg:text_fg"
time_format = "%Y/%m/%d %H:%M"
format = "[о‚¶](fg:time_bg bg:prev_bg)[у±›Ј $time]($style)"

[cmd_duration]
disabled = false
style = "bg:cmd_duration_bg fg:text_fg"
format = "[о‚¶](fg:cmd_duration_bg bg:prev_bg)[ $duration ]($style)"
min_time = 0

[status]
symbol = "п”°  Err"
style = "bg:status_bg fg:status_fg"
format = "[о‚¶](fg:status_bg)[$symbol ]($style)"
disabled = false
