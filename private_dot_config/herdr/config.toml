onboarding = false
[ui]
agent_panel_sort = "spaces"

[keys]
prefix = "f4"

focus_pane_left = "alt+left"
focus_pane_down = "alt+down"
focus_pane_up = "alt+up"
focus_pane_right = "alt+right"

previous_tab = "alt+shift+left"
next_tab = "alt+shift+right"

previous_workspace = "ctrl+alt+up"
next_workspace = "ctrl+alt+down"

split_vertical = "prefix+slash"

[ui.toast]
delivery = "herdr"

[[keys.command]]
key = "prefix+i"
type = "shell"
command = "env HERDR_ENV=1 zsh -ic 'hdr-init'"
description = "init herdr workspace template (main/lazygit/nvim)"

[[keys.command]]
key = "alt+g"
type = "popup"
command = "lazygit"
description = "lazygit (popup)"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+f"
type = "popup"
command = "hunk diff"
description = "hunk diff (working tree)"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+shift+f"
type = "popup"
command = '''zsh -ic 'base=$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null || echo origin/main); hunk diff "$base...HEAD"' '''
description = "hunk diff (branch vs base)"
width = "90%"
height = "90%"
