# package.json script names to allow across every JS package manager.
# The template expands each entry into variants for npm/pnpm/yarn/bun,
# including short forms where supported (e.g. `bun test` for `bun run test`).
agent_shell_allow_js_scripts = [
  "build",
  "test",
  "test:e2e",
  "lint",
  "format",
  "format:check",
  "typecheck",
]

# node_modules `.bin` executables to allow via any JS package runner.
# The template expands each entry into variants for
# npx / bunx / bun x / pnpm exec / pnpm dlx / yarn exec / yarn dlx, plus PM
# shortcuts (e.g. `pnpm vitest`, `bun jest`) and the bare command itself.
agent_shell_allow_js_bins = [
  "jest",
  "vitest",
  "tsc",
  "tsgo",
  "oxlint",
  "eslint",
]

# Allowed commands that should NOT get an auto-generated `rtk <cmd>` variant
# (e.g. rtk itself — wrapping rtk in rtk is meaningless).
agent_shell_allow_no_rtk = [
  "command -v rtk",
  "rtk --help",
  "rtk hook *",
  "rtk read",
  "rtk lint",
  "rtk vitest *",
  "rtk tsc *",
  "rtk pnpm *",
  "rtk docker *",
  "rtk prisma *",
]

